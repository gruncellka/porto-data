# Pre-commit configuration for porto-data
#
# Workflow when data/schema files or version (pyproject.toml) changes:
# 1. pre-commit validates and regenerates metadata.json
# 2. If metadata changed, commit FAILS (by design)
# 3. User reviews changes: git diff porto_data/metadata.json
# 4. User stages and re-commits: git add porto_data/metadata.json && git commit
#
# Same for docs/porto_id.md (regenerated by porto validate --type porto_ids):
# validate-porto-ids runs the validator and git add docs/porto_id.md so mapping tables
# stay in the commit. CI fails if the committed doc does not match live catalog data.
#
# If commit fails with "Stashed changes conflicted" / "patch does not apply" on
# porto_data/metadata.json: you had the same file both staged and unstaged (or
# hooks rewrote it while unstaged edits existed). Fix: `git add porto_data/metadata.json`
# (and any other porto_data JSON you intend to commit), or `git stash` everything,
# then commit. Prefer a clean index for files hooks modify.
#
# Data layout: porto_data/policy/, porto_data/formats/, porto_data/providers/<id>/, porto_data/schemas/,
# porto_data/mappings.json, porto_data/metadata.json (no legacy porto_data/data/).
#
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

# Stop on first failure (cleaner error messages)
fail_fast: true

repos:
    # ==========================================
    # JSON Validation (MUST RUN FIRST)
    # ==========================================
    - repo: local
      hooks:
          - id: validate-schemas
            name: Validate JSON schemas
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main validate --type schema'
            language: system
            files: ^porto_data/(policy|formats|schemas)/.*\.json$|^porto_data/providers/[^/]+/.*\.json$|^porto_data/(mappings|metadata|providers)\.json$
            pass_filenames: false
            always_run: false

          - id: validate-mappings
            name: Validate mappings (registry, metadata, stray files)
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main validate --type mappings'
            language: system
            files: ^porto_data/(mappings|metadata|providers)\.json$|^porto_data/providers/[^/]+/.*\.json$|^porto_data/schemas/.*\.schema\.json$
            pass_filenames: false
            always_run: false

          - id: validate-markets
            name: Validate policy/markets.json
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main validate --type markets'
            language: system
            files: ^porto_data/policy/markets\.json$|^porto_data/providers\.json$|^porto_data/schemas/markets\.schema\.json$|^porto_data/mappings\.json$
            pass_filenames: false
            always_run: false

          - id: validate-limits
            name: Validate limits.json (letter scope)
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main validate --type limits'
            language: system
            files: ^porto_data/providers/.*/limits\.json$|^porto_data/providers\.json$|^porto_data/policy/jurisdictions\.json$|^porto_data/schemas/limits\.schema\.json$
            pass_filenames: false
            always_run: false

          - id: validate-porto-ids
            name: Validate porto_id vocabulary and native-id refs
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main validate --type porto_ids && git add docs/porto_id.md'
            language: system
            files: ^porto_data/providers/[^/]+/(products|services|features|graph)\.json$|^porto_data/providers/[^/]+/prices/.*\.json$|^porto_data/schemas/porto_ids\.schema\.json$|^docs/porto_id\.md$
            pass_filenames: false
            always_run: false

          - id: validate-delivery
            name: Validate products delivery
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main validate --type delivery'
            language: system
            files: ^porto_data/providers/[^/]+/(products|features|graph)\.json$|^porto_data/schemas/products\.schema\.json$|^porto_data/policy/markets\.json$|^porto_data/providers\.json$
            pass_filenames: false
            always_run: false

          - id: validate-graph
            name: Validate graph.json consistency
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main validate --type graph'
            language: system
            files: ^porto_data/providers/.*/graph\.json$|^porto_data/providers/.*/(products|zones|weights|services|features|limits|marks|rules)\.json$|^porto_data/providers/.*/prices/.*\.json$|^porto_data/(policy|formats|schemas)/.*\.json$
            pass_filenames: false
            always_run: false

          - id: generate-metadata
            name: Generate metadata.json
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main metadata && git add porto_data/metadata.json'
            language: system
            # Omit metadata.json so regenerating it does not re-trigger this hook in a loop
            files: ^porto_data/(policy|formats|schemas)/.*\.json$|^porto_data/providers/[^/]+/.*\.json$|^porto_data/mappings\.json$
            pass_filenames: false
            always_run: false

          # On version bump (pyproject.toml / package.json): regenerate and stage metadata so bump2version commit succeeds
          - id: stage-metadata-on-version-bump
            name: Regenerate and stage metadata.json on version bump
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main metadata && git add porto_data/metadata.json'
            language: system
            files: ^pyproject\.toml$|^package\.json$
            pass_filenames: false
            always_run: false

          # Ensure version files end with newline and stage them so end-of-file-fixer does not fail the commit (bump2version may write without trailing newline)
          - id: ensure-version-files-eol
            name: Ensure package.json and pyproject.toml end with newline
            entry: bash -c 'n=$(printf "\\n"); for f in package.json pyproject.toml; do [ -f "$f" ] && [ "$(tail -c 1 "$f" 2>/dev/null)" != "$n" ] && printf "\\n" >> "$f" && git add "$f"; done; true'
            language: system
            files: ^pyproject\.toml$|^package\.json$
            pass_filenames: false
            always_run: false

    # JSON syntax validation
    - repo: local
      hooks:
          - id: lint-json
            name: Validate JSON syntax
            entry: bash -c 'shopt -s nullglob; for file in porto_data/*.json porto_data/schemas/*.json porto_data/policy/*.json porto_data/formats/*.json porto_data/providers/*/*.json porto_data/providers/*/prices/*.json; do python3 -m json.tool "$file" > /dev/null || exit 1; done'
            language: system
            types: [json]
            files: ^porto_data/(policy|formats|schemas)/.*\.json$|^porto_data/providers/[^/]+/.*\.json$|^porto_data/(mappings|metadata|providers)\.json$
            pass_filenames: false
            always_run: false

    # ==========================================
    # Standard Pre-commit Hooks
    # ==========================================
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.5.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-json
          - id: check-added-large-files
            args: ['--maxkb=300']
            # Carrier PDF tariff/API references under docs/providers/ (not shipped in npm/PyPI packages).
            exclude: ^docs/providers/.*\.pdf$
          - id: check-merge-conflict
          - id: check-case-conflict
          - id: no-commit-to-branch
            args: ['--branch', 'main']
          - id: detect-private-key

    # ==========================================
    # JSON Formatting (runs after validation)
    # ==========================================
    # Uses scripts/format_json_file.py (same as Makefile). require_serial avoids parallel
    # hook invocations racing on index.lock (notably when porto-data is a git submodule).
    - repo: local
      hooks:
          - id: format-json
            name: Format JSON files
            entry: bash -c 'for f in "$@"; do python3 scripts/format_json_file.py "$f" || exit 1; done; git add "$@"' bash
            language: system
            types: [json]
            files: ^porto_data/(policy|formats|schemas)/.*\.json$|^porto_data/providers/[^/]+/.*\.json$|^porto_data/(mappings|metadata|providers)\.json$
            pass_filenames: true
            require_serial: true
            always_run: false

    # ==========================================
    # Python Code Quality (porto-data only)
    # ==========================================

    # Ruff formatter (matches pyproject.toml: line-length=100)
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.5
      hooks:
          - id: ruff-format
            args: ['--line-length=100']
            files: ^(scripts|cli|tests)/.*\.py$

          # Ruff linter with auto-fix
          - id: ruff
            args: ['--fix', '--exit-non-zero-on-fix']
            files: ^(scripts|cli|tests)/.*\.py$

    # MyPy type checking
    - repo: local
      hooks:
          - id: mypy
            name: Type check Python code
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. mypy --config-file=pyproject.toml scripts/ cli/'
            language: system
            files: ^(scripts|cli)/.*\.py$
            pass_filenames: false
            always_run: false
