# Pre-commit configuration for porto-data
#
# Workflow when data/schema files or version (pyproject.toml) changes:
# 1. pre-commit validates and regenerates metadata.json
# 2. If metadata changed, commit FAILS (by design)
# 3. User reviews changes: git diff porto_data/metadata.json
# 4. User stages and re-commits: git add porto_data/metadata.json && git commit
#
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

# Stop on first failure (cleaner error messages)
fail_fast: true

repos:
    # ==========================================
    # JSON Validation (MUST RUN FIRST)
    # ==========================================
    - repo: local
      hooks:
          - id: validate-schemas
            name: Validate JSON schemas
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main validate --type schema'
            language: system
            files: ^porto_data/(data|schemas)/.*\.json$
            pass_filenames: false
            always_run: false

          - id: validate-data-links
            name: Validate data_links.json consistency
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main validate --type links'
            language: system
            files: ^porto_data/data/data_links\.json$|^porto_data/data/(products|zones|weight_tiers|services|prices)\.json$
            pass_filenames: false
            always_run: false

          - id: generate-metadata
            name: Generate metadata.json
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main metadata'
            language: system
            files: ^porto_data/(data|schemas)/.*\.json$
            pass_filenames: false
            always_run: false

          # On version bump (pyproject.toml / package.json): regenerate and stage metadata so bump2version commit succeeds
          - id: stage-metadata-on-version-bump
            name: Regenerate and stage metadata.json on version bump
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. python -m cli.main metadata && git add porto_data/metadata.json'
            language: system
            files: ^pyproject\.toml$|^package\.json$
            pass_filenames: false
            always_run: false

          # Ensure version files end with newline and stage them so end-of-file-fixer does not fail the commit (bump2version may write without trailing newline)
          - id: ensure-version-files-eol
            name: Ensure package.json and pyproject.toml end with newline
            entry: bash -c 'n=$(printf "\\n"); for f in package.json pyproject.toml; do [ -f "$f" ] && [ "$(tail -c 1 "$f" 2>/dev/null)" != "$n" ] && printf "\\n" >> "$f" && git add "$f"; done; true'
            language: system
            files: ^pyproject\.toml$|^package\.json$
            pass_filenames: false
            always_run: false

          # Block direct commits to main except version-bump (only package.json, pyproject.toml, metadata.json)
          - id: no-commit-to-main
            name: Block direct commits to main (allow version-bump only)
            entry: bash -c 'branch=$(git branch --show-current); [ "$branch" != "main" ] && exit 0; for f in $(git diff --staged --name-only); do case "$f" in package.json|pyproject.toml|porto_data/metadata.json) ;; *) echo "Direct commits to main are not allowed. Use a feature branch."; exit 1 ;; esac; done; exit 0'
            language: system
            pass_filenames: false
            always_run: true

    # JSON syntax validation
    - repo: local
      hooks:
          - id: lint-json
            name: Validate JSON syntax
            entry: bash -c 'for file in porto_data/data/*.json porto_data/schemas/*.json; do [ -f "$file" ] && python3 -m json.tool "$file" > /dev/null || exit 1; done'
            language: system
            types: [json]
            files: ^porto_data/(data|schemas)/.*\.json$
            pass_filenames: false
            always_run: false

    # ==========================================
    # Standard Pre-commit Hooks
    # ==========================================
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.5.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-json
          - id: check-added-large-files
            args: ['--maxkb=300']
          - id: check-merge-conflict
          - id: check-case-conflict
          - id: detect-private-key

    # ==========================================
    # JSON Formatting (runs after validation)
    # ==========================================
    # JSON formatting (uses json.tool like Makefile). Stage after format so commit succeeds when only whitespace/format changes.
    - repo: local
      hooks:
          - id: format-json
            name: Format JSON files
            entry: bash -c 'for file in porto_data/data/*.json porto_data/schemas/*.json porto_data/metadata.json; do [ -f "$file" ] && python3 -m json.tool "$file" "$file.tmp" && mv "$file.tmp" "$file" && git add "$file" || true; done'
            language: system
            types: [json]
            files: ^porto_data/(data|schemas)/.*\.json$|^porto_data/metadata\.json$
            pass_filenames: false
            always_run: false

    # ==========================================
    # Python Code Quality (porto-data only)
    # ==========================================

    # Ruff formatter (matches pyproject.toml: line-length=100)
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.1.15
      hooks:
          - id: ruff-format
            args: ['--line-length=100']
            files: ^(scripts|cli|tests)/.*\.py$

          # Ruff linter with auto-fix
          - id: ruff
            args: ['--fix', '--exit-non-zero-on-fix']
            files: ^(scripts|cli|tests)/.*\.py$

    # MyPy type checking
    - repo: local
      hooks:
          - id: mypy
            name: Type check Python code
            entry: bash -c 'if [ -f venv/bin/activate ]; then . venv/bin/activate; fi && PYTHONPATH=. mypy --config-file=pyproject.toml scripts/ cli/'
            language: system
            files: ^(scripts|cli)/.*\.py$
            pass_filenames: false
            always_run: false
