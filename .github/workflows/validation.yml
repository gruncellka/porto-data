name: validation

on: [push, pull_request]

env:
    PYTHON_VERSION: '3.13'

jobs:
    # ==========================================
    # JSON Validation (MUST RUN FIRST)
    # ==========================================
    # These can run in parallel - both just need valid JSON files
    validate-schemas:
        name: Validate JSON Schemas
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Install dependencies
              run: make setup
            - name: Validate JSON files against schemas
              run: |
                  . venv/bin/activate && PYTHONPATH=. python -m cli.main validate --type schema

    lint-json:
        name: Lint JSON Syntax
        runs-on: ubuntu-22.04
        # No dependency - just checks JSON syntax, doesn't need schemas
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Install dependencies
              run: make setup
            - name: Lint JSON syntax
              run: make lint-json

    # ==========================================
    # Mappings (needs valid schemas)
    # ==========================================
    validate-mappings:
        name: Validate mappings
        runs-on: ubuntu-22.04
        needs: [validate-schemas]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Install dependencies
              run: make setup
            - name: Validate mappings.json, providers registry, metadata alignment
              run: |
                  . venv/bin/activate && PYTHONPATH=. python -m cli.main validate --type mappings

    validate-limits:
        name: Validate limits (letter scope)
        runs-on: ubuntu-22.04
        needs: [validate-mappings]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Install dependencies
              run: make setup
            - name: Validate providers/*/limits.json
              run: |
                  . venv/bin/activate && PYTHONPATH=. python -m cli.main validate --type limits

    validate-graph:
        name: Validate provider graph.json
        runs-on: ubuntu-22.04
        needs: [validate-mappings]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Install dependencies
              run: make setup
            - name: Validate graph consistency (dependencies, edges, cross-file refs)
              run: |
                  . venv/bin/activate && PYTHONPATH=. python -m cli.main validate --type graph

    # ==========================================
    # Formatting Checks (needs valid data)
    # ==========================================
    format-json:
        name: Check JSON Formatting
        runs-on: ubuntu-22.04
        needs: [validate-schemas, validate-mappings]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Install dependencies
              run: make setup
            - name: Check JSON formatting
              run: make format-json CHECK=1

    verify-metadata:
        name: Verify Metadata
        runs-on: ubuntu-22.04
        needs: [validate-schemas, validate-mappings, validate-limits, validate-graph]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Install dependencies
              run: make setup
            - name: Verify metadata.json is up to date
              run: |
                  . venv/bin/activate && PYTHONPATH=. python -m cli.main metadata
                  if [ -n "$(git diff porto_data/metadata.json)" ]; then
                    echo "❌ metadata.json is out of date. The file must be regenerated and committed."
                    echo "Run 'make metadata' locally, then commit the updated porto_data/metadata.json file."
                    git diff porto_data/metadata.json
                    exit 1
                  fi
                  echo "✓ metadata.json is up to date"

    # ==========================================
    # Python Code Quality (independent of JSON)
    # ==========================================
    # These can run in parallel with JSON validation - completely independent
    format-code:
        name: Check Python Formatting
        runs-on: ubuntu-22.04
        # No dependency - Python code is independent of JSON validation
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Install dependencies
              run: make setup
            - name: Check Python code formatting
              run: make format-code CHECK=1

    lint-code:
        name: Lint Python Code
        runs-on: ubuntu-22.04
        # No dependency - Python code is independent of JSON validation
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Install dependencies
              run: make setup
            - name: Lint Python code
              run: make lint-code

    type-check:
        name: Type Check Python
        runs-on: ubuntu-22.04
        # No dependency - Python code is independent of JSON validation
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Install dependencies
              run: make setup
            - name: Type check Python code
              run: make type-check

    # ==========================================
    # Python Tests (CLI and scripts)
    # ==========================================
    test:
        name: Run Tests with Coverage
        runs-on: ubuntu-22.04
        # Tests can run in parallel with other checks
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Install dependencies
              run: make setup
            - name: Run tests with coverage
              run: make test-cov
            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v5
              continue-on-error: true
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

    # ==========================================
    # Final Summary (waits for all checks)
    # ==========================================
    validation:
        name: Porto Data Validation
        runs-on: ubuntu-22.04
        needs:
            - validate-schemas
            - lint-json
            - validate-mappings
            - validate-limits
            - validate-graph
            - format-json
            - verify-metadata
            - format-code
            - lint-code
            - type-check
            - test
        steps:
            - name: All validation checks passed
              run: echo "✅ All validation checks passed successfully!"
