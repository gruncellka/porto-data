name: validation

on: [push, pull_request]

env:
    PYTHON_VERSION: '3.13'

jobs:
    # ==========================================
    # JSON Validation (MUST RUN FIRST)
    # ==========================================
    # These can run in parallel - schema validation and formatting are independent
    validate-schemas:
        name: Validate JSON Schemas
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Validate JSON files against schemas
              run: |
                  . venv/bin/activate 2>/dev/null || true
                  make venv
                  . venv/bin/activate && PYTHONPATH=. python -m cli.main validate --type schema

    format-json:
        name: Check JSON Formatting
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Check JSON formatting
              run: make format-json CHECK=1

    validate-mappings:
        name: Validate mappings
        runs-on: ubuntu-22.04
        needs: [validate-schemas]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Validate mappings.json, providers registry, metadata alignment
              run: |
                  make venv
                  . venv/bin/activate && PYTHONPATH=. python -m cli.main validate --type mappings

    validate-limits:
        name: Validate limits (letter scope)
        runs-on: ubuntu-22.04
        needs: [validate-markets]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Validate providers/*/limits.json
              run: |
                  make venv
                  . venv/bin/activate && PYTHONPATH=. python -m cli.main validate --type limits

    validate-markets:
        name: Validate policy/markets.json
        runs-on: ubuntu-22.04
        needs: [validate-mappings]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Validate markets vs provider countries
              run: |
                  make venv
                  . venv/bin/activate && PYTHONPATH=. python -m cli.main validate --type markets

    validate-porto-ids:
        name: Validate porto_id vocabulary
        runs-on: ubuntu-22.04
        needs: [validate-limits]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Validate porto_id enums and native-id refs
              run: |
                  make venv
                  . venv/bin/activate && PYTHONPATH=. python -m cli.main validate --type porto_ids
                  if [ -n "$(git diff docs/porto_id.md)" ]; then
                    echo "❌ docs/porto_id.md is out of date. The file must be regenerated and committed."
                    echo "Run 'porto validate --type porto_ids' locally, then commit the updated docs/porto_id.md file."
                    git diff docs/porto_id.md
                    exit 1
                  fi
                  echo "✓ docs/porto_id.md is up to date"

    validate-graph:
        name: Validate provider graph.json
        runs-on: ubuntu-22.04
        needs: [validate-porto-ids]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Validate graph consistency (dependencies, edges, cross-file refs)
              run: make validate-graph

    verify-metadata:
        name: Verify Metadata
        runs-on: ubuntu-22.04
        needs: [validate-schemas, validate-mappings, validate-markets, validate-limits, validate-porto-ids, validate-graph]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Verify metadata.json is up to date
              run: |
                  make metadata
                  if [ -n "$(git diff porto_data/metadata.json)" ]; then
                    echo "❌ metadata.json is out of date. The file must be regenerated and committed."
                    echo "Run 'make metadata' locally, then commit the updated porto_data/metadata.json file."
                    git diff porto_data/metadata.json
                    exit 1
                  fi
                  echo "✓ metadata.json is up to date"

    format-code:
        name: Check Python Formatting
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Check Python code formatting
              run: make format-code CHECK=1

    lint-code:
        name: Lint Python Code
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Lint Python code
              run: make lint-code

    type-check:
        name: Type Check Python
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Type check Python code
              run: make type-check

    test:
        name: Run Tests with Coverage
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: 'pip'
            - name: Run tests with coverage
              run: make test-cov
            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v6.0.0
              continue-on-error: true
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

    validation:
        name: Porto Data Validation
        runs-on: ubuntu-22.04
        needs:
            - validate-schemas
            - format-json
            - validate-mappings
            - validate-markets
            - validate-limits
            - validate-porto-ids
            - validate-graph
            - verify-metadata
            - format-code
            - lint-code
            - type-check
            - test
        steps:
            - name: All validation checks passed
              run: echo "✅ All validation checks passed successfully!"
