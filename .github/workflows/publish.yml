# Publish porto-data to npm and PyPI. Builds run after validate; npm and PyPI publish run in parallel.
# Trigger: tag v* or manual dispatch only. No workflow_run (OR would run on every validation on main/PR).
# Builds and validates each artifact once; publish jobs use those artifacts (no rebuild).

name: Publish to npm and PyPI

# Tag push: main flow (merge to main → push tag v* → workflow runs once).
# workflow_dispatch: (1) run from any branch before merge to test publish or pre-release; (2) re-publish same version if npm or PyPI failed (fix and run again without pushing a new tag). Choose branch in "Run workflow". Do not push a tag for the same version after a manual run (would trigger again and fail).
on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

env:
    NODE_VERSION: '20'
    NODE_VERSION_NPM: '22'
    PYTHON_VERSION: '3.11'
    PACKAGING_MIN_VERSION: '24.2'

jobs:
    # -------------------------------------------------------------------------
    # Validate once (Python); both build jobs depend on this.
    # -------------------------------------------------------------------------
    validate:
        name: Validate (porto)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"

            - name: Validate porto data
              run: porto validate

    # -------------------------------------------------------------------------
    # Build npm package; produce tarball artifact.
    # -------------------------------------------------------------------------
    npm_build:
        name: Build npm package
        runs-on: ubuntu-latest
        needs: [validate]
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  registry-url: 'https://registry.npmjs.org/'

            - name: Install dependencies
              run: npm install

            - name: Build package
              run: npm pack

            - name: Verify tarball contents
              run: |
                  tar -tzf gruncellka-porto-data-*.tgz | head -30
                  test -n "$(tar -tzf gruncellka-porto-data-*.tgz | grep 'package/porto_data/data/')"
                  test -n "$(tar -tzf gruncellka-porto-data-*.tgz | grep 'package/porto_data/schemas/')"
                  echo "Tarball structure OK"

            - name: Upload npm artifact
              uses: actions/upload-artifact@v4
              with:
                  name: npm-package
                  path: gruncellka-porto-data-*.tgz

    # -------------------------------------------------------------------------
    # Build PyPI package; produce wheel + sdist artifacts.
    # -------------------------------------------------------------------------
    pypi_build:
        name: Build PyPI package
        runs-on: ubuntu-latest
        needs: [validate]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"
                  pip install build

            - name: Build package
              run: python3 -m build

            - name: Verify dist contents
              run: |
                  ls -la dist/
                  python3 -m zipfile -l dist/*.whl | head -40
                  echo "Dist structure OK"

            - name: Upload PyPI artifact
              uses: actions/upload-artifact@v4
              with:
                  name: pypi-package
                  path: dist/

    # -------------------------------------------------------------------------
    # Publish in parallel: npm and PyPI run independently after both builds succeed.
    # -------------------------------------------------------------------------
    publish_npm:
        name: Publish to npm
        runs-on: ubuntu-latest
        needs: [npm_build, pypi_build]
        permissions:
            contents: read
            id-token: write
            packages: write
        steps:
            - name: Download npm artifact
              uses: actions/download-artifact@v4
              with:
                  name: npm-package

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION_NPM }}
                  registry-url: 'https://registry.npmjs.org/'

            - name: Publish to npm
              run: npm publish --access public *.tgz

    publish_pypi:
        name: Publish to PyPI
        runs-on: ubuntu-latest
        needs: [npm_build, pypi_build]
        permissions:
            contents: read
        steps:
            - name: Download PyPI artifact
              uses: actions/download-artifact@v4
              with:
                  name: pypi-package
                  path: dist

            - name: Publish to PyPI
              run: |
                  python3 -m pip install --upgrade "packaging>=${{ env.PACKAGING_MIN_VERSION }}" twine
                  python3 -m twine upload dist/*
              env:
                  TWINE_USERNAME: __token__
                  TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

    # -------------------------------------------------------------------------
    # Create GitHub Release only when both npm and PyPI publish succeeded.
    # -------------------------------------------------------------------------
    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: [publish_npm, publish_pypi]
        if: startsWith(github.ref, 'refs/tags/')
        permissions:
            contents: write
        steps:
            - name: Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
